<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foremother Docs</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
  <style>
    body { margin: 0; padding: 40px 20px; background: #fff; }
    .markdown-body { max-width: 900px; margin: 0 auto; box-sizing: border-box; }
  </style>
</head>
<body>
  <article id="content" class="markdown-body">불러오는 중...</article>

  <script>
    fetch('./README.md')
      .then((res) => {
        if (!res.ok) throw new Error('README.md not found');
        return res.text();
      })
      .then((md) => {
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch((err) => {
        document.getElementById('content').innerHTML =
          '<h1>문서를 불러오지 못했습니다</h1><pre>' + err.message + '</pre>';
      });
  </script>
</body>
</html>
